<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:'Cormorant Garamond', serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
    width:90%;
    max-width:900px;
}

.logo{
    width:100%;
    max-width:700px;
    margin-bottom:40px;
    animation:fadeIn 2s ease;
}

h2{
    color:#d4af37;
    font-size:2rem;
    letter-spacing:4px;
    margin-bottom:20px;
    text-transform:uppercase;
}

p{
    color:#d6d6d6;
    font-size:1.2rem;
    line-height:1.8;
    margin-bottom:40px;
}

.loader{
    width:70px;
    height:70px;
    border:4px solid rgba(212,175,55,.2);
    border-top:4px solid #d4af37;
    border-radius:50%;
    margin:auto;
    animation:spin 1.2s linear infinite;
}

.footer{
    position:fixed;
    bottom:25px;
    width:100%;
    text-align:center;
    color:#888;
    font-size:14px;
    letter-spacing:2px;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

h2{
    font-size:1.5rem;
}

p{
    font-size:1rem;
}

.logo{
    max-width:95%;
}

}
</style>
</head>
<body>

<div class="container">

    

    <h2>We're Building Something Amazing</h2>

    <p>
        Our website is currently under construction.<br>
        We'll be launching soon with an exciting new experience.
    </p>

    <div class="loader"></div>

</div>

<div class="footer">
    © 2026 All Rights Reserved
</div>

</body>
</html>
