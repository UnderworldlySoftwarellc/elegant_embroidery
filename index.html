<!-- Modal -->

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modal-img">
        <h2 id="modal-title"></h2>
        <p id="modal-desc"></p>
    </div>
</div>

<!-- Contact Form -->

<div class="contact" id="contact">
    <h2>Custom Orders</h2>
    <form onsubmit="sendEmail(event)">
        <input id="customer-name" type="text" placeholder="Your Name" required>
        <input id="customer-email" type="email" placeholder="Your Email" required>
        <textarea id="request-details" placeholder="Describe your custom embroidery request" required></textarea>
        <button type="submit">Submit Request</button>
    </form>
</div>

<script>
function openModal(imageSrc, title, desc) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("modal-img").src = imageSrc;
    document.getElementById("modal-title").innerText = title;
    document.getElementById("modal-desc").innerText = desc;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function filterSelection(category) {
    let cards = document.getElementsByClassName("card");
    for (let i = 0; i < cards.length; i++) {
        cards[i].style.display = (category === "all" || cards[i].classList.contains(category)) ? "block" : "none";
    }
}

function sendEmail(event) {
    event.preventDefault();

    const name = document.getElementById("customer-name").value;
    const email = document.getElementById("customer-email").value;
    const details = document.getElementById("request-details").value;
    const subject = encodeURIComponent("Custom embroidery request from " + name);
    const body = encodeURIComponent(
        "Name: " + name + "\n" +
        "Email: " + email + "\n\n" +
        "Request:\n" + details
    );

    window.location.href = "mailto:hello@elegantembroidery.com?subject=" + subject + "&body=" + body;
}

document.getElementById("search").addEventListener("keyup", function() {
    let filter = this.value.toLowerCase();
    let cards = document.getElementsByClassName("card");

    for (let i = 0; i < cards.length; i++) {
        let text = cards[i].innerText.toLowerCase();
        cards[i].style.display = text.includes(filter) ? "block" : "none";
    }
});

function scrollToContact() {
    document.getElementById("contact").scrollIntoView({ behavior: 'smooth' });
}
</script>
